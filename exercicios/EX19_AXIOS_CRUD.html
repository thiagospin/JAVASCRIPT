<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisições POST HTTP com Axios</title>

    <!-- Referenciando a CDN do AXIOS -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Referenciando bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>

<body class="bg-light">
    <div class="container py-4 m-5 border rounded bg-white">
        <h1 class="h4 mb-3">Formulário de Cadastro de Produto</h1>

        <form id="post-form">
            <label for="name" class="form-label">Nome</label>
            <input type="text" id="name" class="form-control mb-2" placeholder="Nome do produto">

            <label for="year" class="form-label">Ano de Fabricação</label>
            <input type="number" id="year" class="form-control mb-2" placeholder="Ano de fabricação">

            <label for="price" class="form-label">Preço</label>
            <input type="number" id="price" class="form-control mb-2" placeholder="Preço do produto" step="0.01">

            <label for="cpu" class="form-label">Modelo do Processador</label>
            <input type="text" id="cpu" class="form-control mb-2" placeholder="Modelo do processador">

            <label for="hd" class="form-label">Tamanho do HD</label>
            <input type="text" id="hd" class="form-control mb-3" placeholder="Tamanho do HD">

            <input type="submit" class="btn btn-primary" value="Registrar Produto">
        </form>
    </div>

    <div class="container pb-4 m-5 border rounded bg-white">
        <h2 class="h5 mt-4">Consultar dados enviados pelo POST</h2>
        <input type="text" id="id-produto" class="form-control mb-2" placeholder="Digite o ID do produto">
        <button id="consultar" class="btn btn-outline-primary" type="button">Consultar</button>
    </div>

    <script>

        document.querySelector("#post-form").addEventListener("submit", requestPost);
        document.getElementById("consultar").addEventListener("click", requestGet);

        // Criando um POST com os dados digitados no formulário e armazenando o ID do produto cadastrado para realizar um GET posteriormente
        function requestPost(event) {
            
            event.preventDefault();

            const url_cadastro = "https://api.restful-api.dev/objects";

            const name = document.getElementById("name").value.trim();
            const ano = Number(document.getElementById("year").value);
            const preco = Number(document.getElementById("price").value);
            const cpu = document.getElementById("cpu").value.trim();
            const hd = document.getElementById("hd").value.trim();

            var dados = {
                name: name,
                data: {
                    year: ano,
                    "preco": preco,
                    "modelo cpu": cpu,
                    "Hard disk": hd
                }
            };
            console.log(dados)

            axios
                .post(url_cadastro, dados)
                .then(response => {
                    console.log(response);
                    console.log(`Status da chamada: ${response.status}`);
                    console.log(`ID do produto cadastrado: ${response.data.id}`)
                    id_produto = response.data.id;
                })
        }


        // realizando um GET com o id do objeto cadastrado previamente
        function requestGet(event) {

            var id_produto = document.getElementById("id-produto").value;
            var url_consulta = `https://api.restful-api.dev/objects/${id_produto}`
            console.log(url_consulta);

            axios
                .get(url_consulta)
                .then(resposta => {
                    console.log(resposta.data);
                })
        }

    </script>

</body>

</html>
