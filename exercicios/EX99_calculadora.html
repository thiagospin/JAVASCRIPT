<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora do Ratão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container bg-secondary text-white">
        <h1><i class="bi bi-calculator"></i> Calculadora do Ratão</h1>
        <form>
            <div class="form-group">
                <label for="num1">Primeiro Número:</label>
                <input type="number" class="form-control" id="num1" placeholder="Entre o primeiro número">
            </div>
            <div class="form-group">
                <label for="num2">Segundo Número:</label>
                <input type="number" class="form-control" id="num2" placeholder="Entre o segundo número">
            </div>
            <div class="form-group mt-3">
                <label for="operacao">Operação:</label>
                <select class="form-select" id="operacao">
                    <option value="+">Soma (+)</option>
                    <option value="-">Subtração (-)</option>
                    <option value="*">Multiplicação (*)</option>
                    <option value="/">Divisão (/)</option>
                </select>
            </div>
            <button type="button" class="btn btn-primary mt-2" onclick="calculate()">Calcular</button>
        </form>
        <div id="result" class="mt-3 fw-bold"></div>
    </div>



    <script>
        function somar(a, b) {
            return a + b;
        }

        function subtrair(a, b) {
            return a - b;
        }

        function multiplicar(a, b) {
            return a * b;
        }

        function dividir(a, b) {
            if (b === 0) {
                return "Erro: divisão por zero.";
            }
            return a / b;
        }

        function calculate() {
            const num1 = parseFloat(document.getElementById("num1").value);
            const num2 = parseFloat(document.getElementById("num2").value);
            const operacao = document.getElementById("operacao").value;
            const resultElement = document.getElementById("result");

            if (isNaN(num1) || isNaN(num2)) {
                resultElement.textContent = "Preencha os dois números.";
                return;
            }

            let resultado;

            switch (operacao) {
                case "+":
                    resultado = somar(num1, num2);
                    break;
                case "-":
                    resultado = subtrair(num1, num2);
                    break;
                case "*":
                    resultado = multiplicar(num1, num2);
                    break;
                case "/":
                    resultado = dividir(num1, num2);
                    break;
                default:
                    resultado = "Operação inválida.";
            }

            resultElement.textContent = `Resultado: ${resultado}`;
        }
    </script>
</body>
</html>
